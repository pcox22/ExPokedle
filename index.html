

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExPokedle</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="images/favicon.png" type="image/png">
</head>


<body>
  <header>
    <h1 class="mainHeader">ExPokedle</h1>
  </header>

  <main>
    <div id="gameDetails" class="gameDetails">

    </div>

    <div class="searchContainer" id="searchContainer">
      <input class="search" type="text" id="pokemonSearch" placeholder="Enter a pokemon, e.g 'Weedle'"/>

      <button class="btn" id="submitSearch">
        <i class="fa-solid fa-paper-plane" style="font-size: 18px;"></i>
      </button>

    </div>

    <div id="dataContainer" class="dataContainer">
        
        <div id="optionsDisplay" class="">
        <!-- Empty until the user enters data, will query database for similar results -->
        </div>
    </div>
    <div id="mainDataContainer" class="MDC">
      <div id="stockC" class="comparisons">
        <div id="stockCR" class="comparisonRow">
          <div class="comp compTitle"><button class="infoCard PkmnInfo" id="PkmnInfo">?</button>Pkmn</div>
          <div class="comp compTitle"><button class="infoCard type1Info">?</button>Type 1</div>
          <div class="comp compTitle"><button class="infoCard type2Info">?</button>Type 2</div>
          <div class="comp compTitle"><button class="infoCard stageInfo">?</button>Stage</div>
          <div class="comp compTitle"><button class="infoCard colorInfo">?</button>Color</div>
          <div class="comp compTitle"><button class="infoCard habitatInfo">?</button>Habitat</div>
          <div class="comp compTitle"><button class="infoCard heightInfo">?</button>Height (m)</div>
          <div class="comp compTitle"><button class="infoCard weightInfo">?</button>Weight (kg)</div>
        </div>
      </div>

    <div id="comparisonContainer" class="comparisonContainer">
      <div id="comparisons" class="comparisons">
        <div id="placeholderRow" class="comparisonRow">
          <div class="compEmpty"></div>
          <div class="compEmpty"></div>
          <div class="compEmpty"></div>
          <div class="compEmpty"></div>
          <div class="compEmpty"></div>
          <div class="compEmpty"></div>
          <div class="compEmpty"></div>
          <div class="compEmpty"></div>
        </div>
      </div>
    </div>
    <div id="contactField">
      <button id="contactBtn" class="contactBtn">Report an Issue</button>
    </div>
  </div>
  </div>
  
  </main>

</body>

<script type="module" src="script.js"></script>
<script type="module" src="infoCards.js"></script>
<script type="module" src="contact.js"></script>

<script src="https://kit.fontawesome.com/965544adba.js" crossorigin="anonymous"></script>
</html>
